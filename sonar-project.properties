sonar.projectKey=Eric-Juquel_talent-lens-chatbot
sonar.organization=eric-juquel

sonar.sources=packages/web/src,packages/api/src
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts,**/*.test.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,packages/web/src/api/model/**,packages/web/src/api/services/generated/**

# Coverage (generated by test:coverage / test:cov)
sonar.typescript.lcov.reportPaths=packages/web/coverage/lcov.info,packages/api/coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Quality Gate — informational only, does not block PRs
sonar.qualitygate.wait=false
